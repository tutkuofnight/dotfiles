[colors]
background = #00000
background-alt = #3c3836
foreground = #FFF
primary = #d79921
secondary = #689d6a
alert = #ff3b3b 
disabled = #928374
green = #98971a
blue = #458588
purple = #b16286
orange = #d65d0e

[bar/toph]
width = 100%
height = 20pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
top = true
line-size = 3pt
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font Mono:size=14;3
modules-left = xworkspaces xwindow
modules-right = systray pulseaudio memory xkeyboard date powermenu
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.blue}
label-active-foreground = #00000
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
ramp-volume-0 = " "  
ramp-volume-1 = " "  
ramp-volume-2 = " "  
ramp-volume-foreground = ${colors.primary}
format-volume = <ramp-volume> <label-volume>
label-volume =  %percentage%%
label-muted =   muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
format-prefix = "  "
format-prefix-foreground = ${colors.blue}
label-layout = %layout%
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 5
format-prefix = "  "
format-prefix-foreground = ${colors.purple}
format = <label>
label = %gb_used:2%
click-left = /home/tutku/.config/polybar/monitor.sh

[module/cpu]
type = internal/cpu
interval = 5
label =   %percentage:2%%

[network-base]
type = internal/network
interval = 10
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected =  %ifname% disconnected
label-disconnected-foreground = ${colors.disabled}

[module/eth]
inherit = network-base
interface-type = wired
format-prefix = "  "
format-prefix-foreground = ${colors.green}  
label-connected = %downspeed:2%
# label-connected-foreground = ${colors.green}

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %a %H:%M:%S
format-prefix = "  "
format-prefix-foreground = ${colors.primary}
label = %date%
# label-foreground = ${colors.primary}


[module/powermenu]
type = custom/text
content = " "
content-foreground = ${colors.alert}
click-left = ~/.config/polybar/powermenu.sh

[settings]
screenchange-reload = true
pseudo-transparency = true