[colors]
bg = #1e1e2e
fg = #cdd6f4
primary = #89b4fa
accent = #f38ba8
warn = #f9e2af

[bar/main]
width = 100%
height = 28
radius = 0
monitor = HDMI-0
bottom = true

background = ${colors.bg}
foreground = ${colors.fg}

padding-left = 2
padding-right = 2
module-margin = 2

font-0 = JetBrainsMono Nerd Font:size=9;2
font-1 = Font Awesome 6 Free:size=9;2
font-2 = Noto Color Emoji:size=9;2

modules-left = i3
modules-center = date
modules-right = cpu memory pulseaudio tray

wm-restack = i3
enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize

; ================= WORKSPACES =================
[module/i3]
type = internal/i3

pin-workspaces = true
show-all = true

index-sort = true
wrapping-scroll = false

format = <label-state>

label-focused = %name%
label-focused-background = #4c7899
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-padding = 2

label-visible = %name%
label-visible-padding = 2

label-urgent = %name%!
label-urgent-background = #f00
label-urgent-padding = 2
; ================= CLOCK =================
[module/date]
type = internal/date
interval = 1
date = %H:%M  %d %b
label = %date%

; ================= CPU =================
[module/cpu]
type = internal/cpu
interval = 2
format =   <label>
label = %percentage%%

; ================= RAM =================
[module/memory]
type = internal/memory
interval = 2
format =   <label>
label = %percentage_used%%

; ================= AUDIO =================
[module/pulseaudio]
type = internal/pulseaudio

format-volume =   <label-volume>
label-volume = %percentage%%

format-muted =   muted
label-muted-foreground = ${colors.warn}

scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%
click-right = pactl set-sink-mute @DEFAULT_SINK@ toggle

; ================= TRAY =================
[module/tray]
type = internal/tray
tray-spacing = 6
