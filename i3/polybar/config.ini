[colors]
background = #000000
background-alt = #3c3836
foreground = #FFF
primary = #d79921
secondary = #689d6a
alert = #ff3b3b 
disabled = #928374
green = #98971a
blue = #458588
purple = #b16286
orange = #d65d0e

[bar/toph]
width = 100%
height = 20pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
top = true
line-size = 3pt
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font Mono:size=14;3
modules-left = xworkspaces xwindow
modules-right = spotify systray network backlight nightlight caffeine pulseaudio battery memory xkeyboard date powermenu
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/i3]
type = internal/i3
pin-workspaces = true

[module/systray]
type = internal/tray
format-margin = 0pt
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.blue}
label-active-foreground = #000000
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/spotify]
type = custom/script
exec = ~/.config/polybar/spotify.sh
tail = true
format = <label>
label = %output%
; sol tık: oynat/duraklat — sağ tık: sonraki — orta tık: önceki — kaydır: ileri/geri
click-left = ~/.config/polybar/spotify.sh playpause
click-right = ~/.config/polybar/spotify.sh next
click-middle = ~/.config/polybar/spotify.sh previous
scroll-up = ~/.config/polybar/spotify.sh next
scroll-down = ~/.config/polybar/spotify.sh previous

[module/nightlight]
type = custom/script
exec = ~/.config/polybar/nightlight.sh
tail = true
click-left = ~/.config/polybar/nightlight.sh toggle

[module/caffeine]
type = custom/script
exec = ~/.config/polybar/caffeine.sh
tail = true
click-left = ~/.config/polybar/caffeine.sh toggle

[module/pulseaudio]
type = internal/pulseaudio
ramp-volume-0 = " "  
ramp-volume-1 = " "  
ramp-volume-2 = " "  
ramp-volume-foreground = ${colors.primary}
format-volume = <ramp-volume> <label-volume>
label-volume =  %percentage%%
label-muted =   muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
format-prefix = "  "
format-prefix-foreground = ${colors.blue}
label-layout = %layout%
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 5
format-prefix = "  "
format-prefix-foreground = ${colors.purple}
format = <label>
label = %{A1:/home/tutku/.config/polybar/monitor.sh:}%gb_used:2%%{A}

[module/cpu]
type = internal/cpu
interval = 5
label =   %percentage:2%%

[module/network]
type = custom/script
exec = ~/.config/polybar/network.sh
tail = true

[module/backlight]
type = custom/script
exec = ~/.config/polybar/backlight.sh
tail = true
format = <label>
format-prefix = "  "
format-prefix-foreground = ${colors.purple}
label = %output%
scroll-up = brightnessctl -q set +5%
scroll-down = brightnessctl -q set 5%-

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0
full-at = 99
poll-interval = 5
format-charging = <animation-charging>  <label-charging>
format-discharging = <ramp-capacity>  <label-discharging>
format-full = <ramp-capacity>  <label-full>
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%
ramp-capacity-0 = ""
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1 = ""
ramp-capacity-1-foreground = ${colors.alert}
ramp-capacity-2 = ""
ramp-capacity-2-foreground = ${colors.primary}
ramp-capacity-3 = ""
ramp-capacity-3-foreground = ${colors.primary}
ramp-capacity-4 = ""
ramp-capacity-4-foreground = ${colors.green}
ramp-capacity-5 = ""
ramp-capacity-5-foreground = ${colors.green}
ramp-capacity-6 = ""
ramp-capacity-6-foreground = ${colors.green}
ramp-capacity-7 = ""
ramp-capacity-7-foreground = ${colors.green}
ramp-capacity-8 = ""
ramp-capacity-8-foreground = ${colors.green}
ramp-capacity-9 = ""
ramp-capacity-9-foreground = ${colors.green}
animation-charging-0 = ""
animation-charging-1 = ""
animation-charging-2 = ""
animation-charging-3 = ""
animation-charging-4 = ""
animation-charging-5 = ""
animation-charging-6 = ""
animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 750
[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %a %H:%M:%S
format-prefix = "  "
format-prefix-foreground = ${colors.primary}
label = %date%
# label-foreground = ${colors.primary}


[module/powermenu]
type = custom/text
content = " "
content-foreground = ${colors.alert}
click-left = ~/.config/polybar/powermenu.sh

[settings]
screenchange-reload = true
pseudo-transparency = true
